services:
  # ---------------------------------------------------------------------------
  # 1. Database Layer: PostgreSQL 16
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: kubemind-db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kubemind}
      POSTGRES_USER: ${POSTGRES_USER:-kubemind_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kubemind_secure_password_2026}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kubemind_admin} -d ${POSTGRES_DB:-kubemind}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # 2. Backend API Gateway Layer: Spring Boot 3 & Java 21
  # ---------------------------------------------------------------------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: kubemind-backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kubemind}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-kubemind_admin}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-kubemind_secure_password_2026}
      JWT_SECRET: ${JWT_SECRET:-9a8b7c6d5e4f3a2b1c0d9e8f7a6b5c4d3e2f1a0b9c8d7e6f5a4b3c2d1e0f9a8b}
      PROMETHEUS_URL: ${PROMETHEUS_URL:-http://host.docker.internal:9090}
      GITHUB_TOKEN: ${GITHUB_TOKEN:-}
      GITHUB_REPOS: ${GITHUB_REPOS:-}
      GRAFANA_URL: ${GRAFANA_URL:-}
      GRAFANA_API_KEY: ${GRAFANA_API_KEY:-}
    ports:
      - "8080:8080"
    volumes:
      - ~/.kube/config:/root/.kube/config:ro
    extra_hosts:
      - "kubernetes.docker.internal:host-gateway"
      - "host.docker.internal:host-gateway"

  # ---------------------------------------------------------------------------
  # 3. Model Context Protocol (MCP) Server: Python FastAPI
  # ---------------------------------------------------------------------------
  mcp-server:
    build:
      context: ./mcp-server
      dockerfile: Dockerfile
    container_name: kubemind-mcp-server
    restart: always
    depends_on:
      - backend
    environment:
      BACKEND_URL: http://backend:8080/api/v1
      PORT: 8001
    ports:
      - "8001:8001"

  # ---------------------------------------------------------------------------
  # 4. AI Subsystem Microservice: Python FastAPI
  # ---------------------------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: kubemind-ai-service
    restart: always
    environment:
      PORT: 8000
    ports:
      - "8000:8000"

  # ---------------------------------------------------------------------------
  # 5. Frontend Command Center Interface: React 19 & Vite (Nginx)
  # ---------------------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: kubemind-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
